<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=1">
  <link rel="icon" href="favicon.ico?v=1">
  <title>Acompanhamento de Vagas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--accent:#4f8ef7;--accent2:#7c3aed;--text:#e8eaf0;--muted:#6b7280;--radius:14px;
          --ok:#22c55e;--warn:#f59e0b;--full:#ef4444;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;}
    .topbar{position:sticky;top:0;z-index:10;background:rgba(15,17,23,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
    .topbar h1{font-size:15px;font-weight:600;flex:1;min-width:170px;}
    .topbar a{color:var(--muted);font-size:13px;text-decoration:none;}
    .btn-refresh{background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);font:600 13px 'DM Sans';padding:9px 16px;cursor:pointer;}
    .wrap{max-width:820px;margin:0 auto;padding:16px;}
    .resumo{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
    .pill{flex:1;min-width:130px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 16px;text-align:center;}
    .pill .n{font-size:22px;font-weight:700;}
    .pill .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-top:3px;}
    .n-ok{color:var(--ok);} .n-warn{color:var(--warn);} .n-full{color:var(--full);}
    .status{font-size:12px;color:var(--muted);margin-bottom:14px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px 18px;margin-bottom:10px;}
    .card.lotada{border-color:rgba(239,68,68,.45);}
    .card.quase{border-color:rgba(245,158,11,.4);}
    .linha1{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:2px;}
    .nome{font-size:14px;font-weight:600;line-height:1.35;}
    .badge{flex-shrink:0;font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border-radius:999px;padding:3px 10px;white-space:nowrap;}
    .b-ok{background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.25);}
    .b-warn{background:rgba(245,158,11,.14);color:#fcd34d;border:1px solid rgba(245,158,11,.3);}
    .b-full{background:rgba(239,68,68,.14);color:#fca5a5;border:1px solid rgba(239,68,68,.3);}
    .sub{font-size:12px;color:var(--muted);margin-bottom:9px;}
    .barra{height:8px;background:#252837;border-radius:99px;overflow:hidden;margin-bottom:7px;}
    .fill{height:100%;border-radius:99px;background:var(--ok);}
    .fill.warn{background:var(--warn);} .fill.full{background:var(--full);}
    .nums{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);}
    .nums b{color:var(--text);}
    .negado{max-width:480px;margin:80px auto;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:34px 26px;font-size:14px;line-height:1.7;}
    .negado b{color:#fca5a5;}
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js?v=19"></script>
<script src="auth.js?v=19"></script>

<div class="topbar">
  <h1>Acompanhamento de vagas</h1>
  <button class="btn-refresh" onclick="carregar()">Atualizar</button>
  <a href="fiscal.html">&larr; Voltar</a>
</div>

<div class="wrap" id="app" style="display:none">
  <div class="resumo">
    <div class="pill"><div class="n" id="rIns">–</div><div class="l">Inscritos</div></div>
    <div class="pill"><div class="n n-ok" id="rDisp">–</div><div class="l">Com vagas</div></div>
    <div class="pill"><div class="n n-warn" id="rQuase">–</div><div class="l">Quase cheias</div></div>
    <div class="pill"><div class="n n-full" id="rLot">–</div><div class="l">Lotadas</div></div>
  </div>
  <div class="status" id="status">Carregando…</div>
  <div id="lista"></div>
</div>

<div class="negado" id="negado" style="display:none">
  <b>Acesso restrito.</b><br>
  O acompanhamento de vagas está disponível apenas para a equipe organizadora autorizada.
</div>

<script>
  var PERMITIDOS = [
    "julianabertoleti@educacao.pmrp.sp.gov.br",
    "matheusprospero@educacao.pmrp.sp.gov.br",
    "diogoperez@educacao.pmrp.sp.gov.br"
  ];

  // Capacidades oficiais (doc LOCAIS E PALESTRANTES) — fallback caso a coluna
  // capacidade ainda não exista no banco (db/adicionar-capacidade.sql).
  var CAP_PADRAO = {
    ALEM_TELAS_M:200, ALEM_TELAS_T:200, ALFABETIZACAO_M:450, ALFABETIZACAO_T:450,
    CRIANDO_PONTES_M:450, CRIANDO_PONTES_T:450, DA_MEMORIA_M:135, DA_MEMORIA_T:135,
    EDUCAR_CONVIVER_M:800, EDUCAR_CONVIVER_T:800, EDUC_ALIMENTAR_M:400, EDUC_ALIMENTAR_T:400,
    EJA_N:80, GESTAO_DEMOCRATICA_M:180, GESTAO_DEMOCRATICA_T:180,
    INFANCIA_ATIVIDADE_M:140, INFANCIA_ATIVIDADE_T:140, MOCHILA_M:450, MOCHILA_T:450,
    PRETO_CAFE_M:200, PRETO_CAFE_T:200, QUEM_BRINCA_M:300, QUEM_BRINCA_T:300,
    DIALOGOS_DIREITO_M:95, DIALOGOS_DIREITO_T:95
  };
  var LIMIAR_QUASE = 0.9;   // >= 90% ocupado = "quase cheia"

  function supaHeaders(){
    return { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY, "Accept-Profile": SUPA_SCHEMA, "Content-Profile": SUPA_SCHEMA };
  }

  window.onload = function(){
    protegerPagina().then(function(user){
      if (!user) return;
      if (PERMITIDOS.indexOf(String(user.email||"").toLowerCase()) === -1) {
        document.getElementById("negado").style.display = "block";
        return;
      }
      document.getElementById("app").style.display = "block";
      carregar();
    });
  };

  function carregar(){
    document.getElementById("status").textContent = "Carregando…";
    Promise.all([
      fetch(SUPA_URL + "/palestras?select=id,nome,local,periodo,hora,capacidade&order=nome,periodo", { headers: supaHeaders() })
        .then(function(r){ return r.json(); })
        .catch(function(){ return []; }),
      fetchAll(SUPA_URL + "/participantes?select=palestra_id", supaHeaders())
    ]).then(function(res){
      var palestras = Array.isArray(res[0]) ? res[0] : [];
      // Se a coluna capacidade ainda não existe, o PostgREST devolve erro (não-array): refaz sem ela.
      if (!palestras.length) {
        return fetch(SUPA_URL + "/palestras?select=id,nome,local,periodo,hora&order=nome,periodo", { headers: supaHeaders() })
          .then(function(r){ return r.json(); })
          .then(function(p){ desenha(Array.isArray(p)?p:[], res[1]); });
      }
      desenha(palestras, res[1]);
    }).catch(function(){
      document.getElementById("status").textContent = "Erro ao carregar. Tente Atualizar.";
    });
  }

  function desenha(palestras, parts){
    var cont = {};
    (Array.isArray(parts)?parts:[]).forEach(function(p){ cont[p.palestra_id] = (cont[p.palestra_id]||0) + 1; });

    var dados = palestras.map(function(p){
      var cap = (p.capacidade != null ? p.capacidade : CAP_PADRAO[p.id]) || null;
      var ins = cont[p.id] || 0;
      var pct = cap ? ins / cap : null;
      var st  = !cap ? "ok" : (ins >= cap ? "full" : (pct >= LIMIAR_QUASE ? "warn" : "ok"));
      return { p:p, cap:cap, ins:ins, pct:pct, st:st };
    }).sort(function(a,b){ return (b.pct||0) - (a.pct||0); });

    var tot = 0, nOk = 0, nWarn = 0, nFull = 0, html = "";
    dados.forEach(function(d){
      tot += d.ins;
      if (d.st==="full") nFull++; else if (d.st==="warn") nWarn++; else nOk++;

      var badge = d.st==="full"
        ? '<span class="badge b-full">Lotada' + (d.cap ? " +" + (d.ins-d.cap) : "") + '</span>'
        : d.st==="warn" ? '<span class="badge b-warn">Quase cheia</span>'
        : '<span class="badge b-ok">' + (d.cap ? (d.cap-d.ins) + " vagas" : "—") + '</span>';

      var pctTxt = d.pct != null ? Math.round(d.pct*100) + "%" : "capacidade não informada";
      var w = d.pct != null ? Math.min(100, Math.round(d.pct*100)) : 0;

      html += '<div class="card ' + (d.st==="full"?"lotada":d.st==="warn"?"quase":"") + '">' +
        '<div class="linha1"><div class="nome">' + escapeHtml(d.p.nome||d.p.id) + '</div>' + badge + '</div>' +
        '<div class="sub">' + escapeHtml((periodoCurto(d.p.periodo)||"") + (d.p.hora?" · "+d.p.hora:"") + (d.p.local?" · "+d.p.local:"")) + '</div>' +
        '<div class="barra"><div class="fill ' + (d.st==="full"?"full":d.st==="warn"?"warn":"") + '" style="width:' + w + '%"></div></div>' +
        '<div class="nums"><span><b>' + d.ins + '</b>' + (d.cap ? ' / ' + d.cap + ' lugares' : ' inscritos') + '</span><span>' + pctTxt + '</span></div>' +
        '</div>';
    });

    document.getElementById("rIns").textContent   = tot;
    document.getElementById("rDisp").textContent  = nOk;
    document.getElementById("rQuase").textContent = nWarn;
    document.getElementById("rLot").textContent   = nFull;
    document.getElementById("lista").innerHTML    = html;
    document.getElementById("status").textContent =
      dados.length + " sessões · atualizado em " + new Date().toLocaleTimeString("pt-BR");
  }
</script>
</body>
</html>
