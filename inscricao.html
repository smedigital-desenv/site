<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Inscricao</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;--accent:#4f8ef7;--accent2:#7c3aed;--success:#22c55e;--warning:#f59e0b;--text:#e8eaf0;--muted:#6b7280;--radius:14px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(79,142,247,.07) 0%,transparent 70%),radial-gradient(ellipse 50% 50% at 80% 80%,rgba(124,58,237,.06) 0%,transparent 70%);pointer-events:none;}
    .container{width:100%;max-width:440px;}
    .logo{text-align:center;margin-bottom:28px;}
    .logo-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 8px 24px rgba(79,142,247,.25);}
    .logo-icon svg{width:26px;height:26px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .logo h1{font-size:20px;font-weight:600;}
    .logo p{font-size:13px;color:var(--muted);margin-top:4px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:12px;animation:fadeUp .25s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .card-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin-bottom:16px;}
    .field-group{margin-bottom:14px;}
    label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;}
    input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 16px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.15);}
    .hint{font-size:12px;color:var(--muted);margin-top:-4px;margin-bottom:6px;}
    .btn{width:100%;padding:15px;border:none;border-radius:11px;font-size:16px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s,transform .1s;}
    .btn:active{transform:scale(.97);}
    .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px rgba(79,142,247,.3);}
    .btn-ghost{background:var(--surface);color:var(--muted);border:1px solid var(--border);margin-top:10px;font-size:14px;}
    .msg{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.5;display:none;}
    .msg.erro{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2);display:block;}
    .msg.info{background:rgba(79,142,247,.12);color:#93c5fd;border:1px solid rgba(79,142,247,.2);display:block;}
    #tela-resultado{display:none;}
    .saudacao{font-size:15px;color:var(--text);margin-bottom:4px;}
    .saudacao b{font-weight:600;}
    .badge-sessao{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:6px;background:rgba(79,142,247,.15);color:#93c5fd;border:1px solid rgba(79,142,247,.25);margin-bottom:10px;}
    .field-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);}
    .field-row:last-child{border-bottom:none;padding-bottom:0;}
    .field-row:first-child{padding-top:0;}
    .field-label{font-size:13px;color:var(--muted);flex-shrink:0;min-width:64px;}
    .field-value{font-size:14px;color:var(--text);text-align:right;word-break:break-word;font-weight:500;}
    .qr-wrap{text-align:center;padding:14px 0 4px;}
    .qr-wrap img{width:220px;height:220px;border-radius:12px;border:1px solid var(--border);background:#fff;padding:8px;}
    .btn-download{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:10px;margin-top:14px;background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.25);text-decoration:none;font-size:14px;font-weight:600;transition:background .2s;}
    .btn-download:hover{background:rgba(34,197,94,.2);}
    .btn-download svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    /* ---- INGRESSO ---- */
    .ingresso{background:#fff;color:#16181d;border-radius:18px;overflow:hidden;margin-bottom:16px;box-shadow:0 12px 34px rgba(0,0,0,.4);animation:fadeUp .25s ease both;}
    .ing-head{background:linear-gradient(135deg,#1f4e79,#4f8ef7);color:#fff;padding:16px 22px;}
    .ing-evento{font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;opacity:.9;}
    .ing-tema{font-size:13px;font-weight:600;margin-top:3px;line-height:1.3;}
    .ing-nome{font-size:21px;font-weight:700;letter-spacing:-.01em;margin:16px 22px 1px;}
    .ing-sub{font-size:10.5px;color:#8a90a0;margin:0 22px 14px;text-transform:uppercase;letter-spacing:1px;}
    .ing-body{padding:0 22px;}
    .ing-palestra{font-size:15px;font-weight:600;color:#16181d;line-height:1.35;margin-bottom:3px;}
    .ing-palestrante{font-size:13px;color:#5b6270;margin-bottom:16px;}
    .ing-grid{display:flex;gap:8px;margin-bottom:14px;}
    .ing-info{flex:1;}
    .ing-info .k{font-size:9.5px;color:#9aa0aa;text-transform:uppercase;letter-spacing:.6px;}
    .ing-info .v{font-size:14px;color:#16181d;font-weight:700;margin-top:2px;}
    .ing-local{font-size:13.5px;color:#2a2e37;line-height:1.4;margin-bottom:8px;}
    .ing-local .end{color:#8a90a0;font-size:12px;}
    .ing-divider{position:relative;border-top:2px dashed #d5d9e0;margin:6px 22px;}
    .ing-divider::before,.ing-divider::after{content:"";position:absolute;top:-12px;width:22px;height:22px;border-radius:50%;background:var(--bg);}
    .ing-divider::before{left:-33px;}
    .ing-divider::after{right:-33px;}
    .ing-qr{text-align:center;padding:16px 22px 22px;}
    .ing-qr img{width:200px;height:200px;background:#fff;border-radius:10px;}
    .ing-token{font-family:'DM Mono',monospace;font-size:12px;color:#7a8090;margin-top:8px;letter-spacing:1.5px;}
    .ing-foot{font-size:11px;color:#9aa0aa;margin-top:5px;}
    .ing-baixar{display:inline-flex;align-items:center;justify-content:center;gap:8px;max-width:210px;width:100%;padding:11px;border-radius:9px;margin:14px auto 0;background:#eef3f8;color:#1f4e79;border:1px solid #d6e2ef;text-decoration:none;font-size:13px;font-weight:600;}
    .ing-baixar svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .btn-print{width:100%;padding:13px;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn-print svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    @media print{
      body{background:#fff;padding:0;}
      body::before,.logo,#tela-form,.btn-ghost,.btn-print,.ing-baixar,.menu-global{display:none!important;}
      .container{max-width:100%;}
      .ingresso{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid;margin:0 0 14px;}
      .ing-divider::before,.ing-divider::after{background:#fff;}
    }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js?v=16"></script>
<script src="auth.js?v=16"></script>
<script src="menu.js?v=16"></script>
<div class="container">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h.01M14 17h.01M17 14h.01M17 17h.01M20 14h.01M20 17h.01M20 20h.01M17 20h.01M14 20h.01"/></svg>
    </div>
    <h1>Minha Inscricao</h1>
    <p>Consulte sua inscricao e QR Code</p>
  </div>

  <div id="tela-form">
    <div class="card">
      <div class="card-title">Identificacao</div>
      <div class="field-group">
        <label for="inputBusca">Codigo funcional ou e-mail</label>
        <input type="text" id="inputBusca" placeholder="Ex: 40119  ou  seu@email.com" autocomplete="off"/>
      </div>
      <button class="btn btn-primary" id="btnBuscar" onclick="buscar()">Consultar inscricao</button>
      <div class="msg" id="msgForm"></div>
    </div>
  </div>

  <div id="tela-resultado">
    <div class="card">
      <p class="saudacao">Ola, <b id="rNome"></b>!</p>
      <p class="hint" id="rSub">Apresente o QR Code na entrada da sua palestra.</p>
    </div>
    <div id="listaSessoes"></div>
    <button class="btn-print" onclick="window.print()"><svg viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>Imprimir ingresso(s)</button>
    <button class="btn btn-ghost" onclick="voltar()">Consultar outro</button>
  </div>
</div>

<script>
  // SUPA_URL / SUPA_KEY / SUPA_SCHEMA definidos em config.js
  var BASE_VALIDACAO = "https://smedigital.com.br/presenca/validar.html";

  function supaHeaders() {
    return { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY, "Content-Type": "application/json", "Accept-Profile": SUPA_SCHEMA, "Content-Profile": SUPA_SCHEMA };
  }

  // URL da imagem do QR gerada direto do token (sem depender do Drive)
  function qrImgUrl(token) {
    var alvo = BASE_VALIDACAO + "?t=" + encodeURIComponent(token);
    return "https://quickchart.io/qr?size=300&margin=1&ecLevel=M&text=" + encodeURIComponent(alvo);
  }

  function buscar() {
    var valor = document.getElementById("inputBusca").value.trim();
    var msg   = document.getElementById("msgForm");
    var btn   = document.getElementById("btnBuscar");
    if (!valor) { msg.className="msg erro"; msg.innerHTML="Informe seu codigo funcional ou e-mail."; return; }

    btn.disabled=true; btn.textContent="Consultando...";
    msg.className="msg info"; msg.innerHTML="Buscando sua inscricao...";

    // Funcao RPC (SECURITY DEFINER): busca por codigo funcional OU e-mail.
    fetch(SUPA_URL + "/rpc/consultar_inscricao_busca", {
      method:  "POST",
      headers: supaHeaders(),
      body:    JSON.stringify({ p_busca: valor })
    })
    .then(function(r){ if (!r.ok) throw new Error("rpc"); return r.json(); })
    .then(function(data){ finalizar(data, btn, msg); })
    .catch(function(){
      // Fallback: consulta direta (caso a RPC ainda nao exista no Supabase)
      buscarLegado(valor, btn, msg);
    });
  }

  // Fallback compativel: consulta direta por email (case-insensitive) ou codigo_funcional.
  function buscarLegado(valor, btn, msg) {
    var v = encodeURIComponent(valor);
    var url = SUPA_URL + "/participantes?or=(email.ilike." + v + ",codigo_funcional.eq." + v + ")" +
              "&select=token,nome,email,palestra_id,palestras(nome,local,endereco,periodo,hora)";
    fetch(url, { headers: supaHeaders() })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (Array.isArray(data)) {
        data = data.map(function(p){
          var pl = p.palestras || {};
          return { token:p.token, nome:p.nome, email:p.email, palestra_id:p.palestra_id,
                   palestra_nome:pl.nome, local:pl.local, endereco:pl.endereco, periodo:pl.periodo, hora:pl.hora };
        });
      }
      finalizar(Array.isArray(data)?data:[], btn, msg);
    })
    .catch(function(){
      btn.disabled=false; btn.textContent="Consultar inscricao";
      msg.className="msg erro"; msg.innerHTML="Erro de comunicacao. Tente novamente.";
    });
  }

  function finalizar(data, btn, msg) {
    btn.disabled=false; btn.textContent="Consultar inscricao";
    if (!Array.isArray(data) || data.length===0) {
      msg.className="msg erro"; msg.innerHTML="Inscricao nao encontrada. Verifique o codigo funcional ou e-mail informado.";
      return;
    }
    msg.className="msg";
    mostrarResultado(data);
  }

  // Palestrantes por palestra (sufixo _M/_T/_N removido) — fonte: doc oficial.
  var PALESTRANTES = {
    "MOCHILA":"Ana Paula Silveira",
    "ALFABETIZACAO":"Soraya Maria Romano Pacifico",
    "ALEM_TELAS":"Vivian Caroline Coraucci",
    "CRIANDO_PONTES":"Dra Margherita Midea Cuccovia, Andresa Andrade e Amanda Correa",
    "DA_MEMORIA":"Jose Antonio Correa Lages",
    "EDUCAR_CONVIVER":"Profa. Dra. Fabiana Maris Versuti",
    "EDUC_ALIMENTAR":"Maria Fernanda Laus, Joyce Silva Moraes e Bruna Squassoni",
    "GESTAO_DEMOCRATICA":"Bianca Correa",
    "INFANCIA_ATIVIDADE":"Hugo Tourinho",
    "EJA":"Erika Osakabe",
    "PRETO_CAFE":"Dagoberto Jose Fonseca",
    "QUEM_BRINCA":"Tatiana Noronha"
  };
  function palestranteDe(id) {
    var base = String(id || "").replace(/_(M|T|N)\d*$/, "");
    return PALESTRANTES[base] || "";
  }

  function mostrarResultado(rows) {
    document.getElementById("rNome").textContent = rows[0].nome || "";
    document.getElementById("rSub").textContent =
      rows.length > 1
        ? "Voce tem " + rows.length + " inscricoes. Guarde/imprima o ingresso de cada palestra."
        : "Guarde ou imprima seu ingresso e apresente o QR Code na entrada.";

    var lista = document.getElementById("listaSessoes");
    lista.innerHTML = "";
    rows.forEach(function(p) {
      var per   = nomePeriodo(p.periodo, p.palestra_id);
      var hora  = p.hora || horaDoId(p.palestra_id);
      var pal   = palestranteDe(p.palestra_id);
      var img   = qrImgUrl(p.token);

      var t = document.createElement("div");
      t.className = "ingresso";
      t.innerHTML =
        '<div class="ing-head">' +
          '<div class="ing-evento">Congresso Municipal de Educacao &middot; 21/07/2026</div>' +
          '<div class="ing-tema">Educar para COMviver &mdash; Ribeirao 170 anos</div>' +
        '</div>' +
        '<div class="ing-nome">' + escapeHtml(p.nome || "") + '</div>' +
        '<div class="ing-sub">Credencial de acesso</div>' +
        '<div class="ing-body">' +
          '<div class="ing-palestra">' + escapeHtml(p.palestra_nome || p.palestra_id) + '</div>' +
          (pal ? '<div class="ing-palestrante">com ' + escapeHtml(pal) + '</div>' : '') +
          '<div class="ing-grid">' +
            '<div class="ing-info"><div class="k">Data</div><div class="v">21/07</div></div>' +
            '<div class="ing-info"><div class="k">Horario</div><div class="v">' + escapeHtml(hora) + '</div></div>' +
            '<div class="ing-info"><div class="k">Periodo</div><div class="v">' + escapeHtml(per) + '</div></div>' +
          '</div>' +
          '<div class="ing-local"><strong>' + escapeHtml(p.local || "-") + '</strong>' +
            (p.endereco ? '<br><span class="end">' + escapeHtml(p.endereco) + '</span>' : '') + '</div>' +
        '</div>' +
        '<div class="ing-divider"></div>' +
        '<div class="ing-qr">' +
          '<img src="' + img + '" alt="QR Code">' +
          '<div class="ing-token">' + escapeHtml(p.token) + '</div>' +
          '<div class="ing-foot">Apresente este QR Code na entrada</div>' +
          '<a class="ing-baixar" href="' + img + '" target="_blank" rel="noopener">' +
            '<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Baixar QR</a>' +
        '</div>';
      lista.appendChild(t);
    });

    document.getElementById("tela-form").style.display     = "none";
    document.getElementById("tela-resultado").style.display = "block";
  }

  function nomePeriodo(periodo, id) {
    if (periodo) return periodo;
    if (/_M\d*$/.test(id||"")) return "Manha";
    if (/_T\d*$/.test(id||"")) return "Tarde";
    if (/_N\d*$/.test(id||"")) return "Noite";
    return "Sessao";
  }
  function horaDoId(id) {
    if (/_M\d*$/.test(id||"")) return "08:00";
    if (/_T\d*$/.test(id||"")) return "14:00";
    if (/_N\d*$/.test(id||"")) return "19:00";
    return "";
  }

  function voltar() {
    document.getElementById("tela-resultado").style.display = "none";
    document.getElementById("tela-form").style.display      = "block";
    document.getElementById("inputBusca").value = "";
    document.getElementById("msgForm").className = "msg";
  }

  document.getElementById("inputBusca").addEventListener("keydown", function(e){ if(e.key==="Enter") buscar(); });
</script>
</body>
</html>
